<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SonosControl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      padding-top: calc(20px + env(safe-area-inset-top, 0px));
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.12);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: none;
      color: #0a84ff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:active { transform: scale(0.95); opacity: 0.7; }

    /* --- Quick actions --- */
    .quick-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .quick-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .quick-btn:active:not(:disabled) { transform: scale(0.97); opacity: 0.8; }
    .quick-btn:disabled { opacity: 0.25; cursor: default; }

    .quick-btn.group-house {
      background: #0a84ff;
      color: #fff;
    }

    .quick-btn.ungroup-house {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    /* --- House status pill --- */
    .house-status {
      text-align: center;
      margin-bottom: 20px;
    }

    .house-status .pill {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .pill.grouped {
      background: rgba(48,209,88,0.15);
      color: #30d158;
    }

    .pill.ungrouped {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.45);
    }

    .status {
      text-align: center;
      color: rgba(255,255,255,0.5);
      padding: 60px 0;
      font-size: 17px;
    }

    .status.error { color: #ff453a; }

    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Group card (frosted glass) --- */
    .group {
      background: rgba(255,255,255,0.08);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      backdrop-filter: blur(40px) saturate(180%);
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    /* --- Group volume (for multi-speaker groups) --- */
    .group-volume-row {
      display: flex;
      align-items: center;
      padding: 12px 18px;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .group-volume-label {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 50px;
    }

    /* --- Speaker row --- */
    .speaker {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .speaker:first-child { border-top: none; }

    .speaker-name {
      font-size: 17px;
      font-weight: 500;
      flex: 1;
      letter-spacing: -0.2px;
    }

    .speaker-coordinator {
      font-size: 11px;
      font-weight: 600;
      color: #0a84ff;
      background: rgba(10,132,255,0.15);
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* --- Volume sliders --- */
    .volume-row {
      display: flex;
      align-items: center;
      padding: 4px 18px 14px 18px;
      gap: 12px;
    }

    .volume-label {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      min-width: 30px;
      text-align: right;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .pad-bottom { height: 30px; }
  </style>
</head>
<body>
  <header>
    <h1>Sonos</h1>
    <button class="refresh-btn" onclick="loadSpeakers()">Refresh</button>
  </header>

  <div class="quick-actions">
    <button class="quick-btn ungroup-house" id="btn-ungroup-house" onclick="ungroupHouse()">Ungroup House</button>
    <button class="quick-btn group-house" id="btn-group-house" onclick="groupHouse()">Group House</button>
  </div>

  <div id="house-status" class="house-status"></div>
  <div id="app"></div>
  <div class="pad-bottom"></div>

  <script>
    const HOUSE_SPEAKERS = ['Kitchen', 'One', 'Family Room'];

    let speakers = [];
    let groups = [];
    let speakerVolumes = {};
    let volumeDebounce = {};

    async function loadSpeakers() {
      const app = document.getElementById('app');
      app.innerHTML = '<div class="status"><span class="spinner"></span>Discovering speakers...</div>';
      document.getElementById('house-status').innerHTML = '';

      try {
        const res = await fetch('/api/speakers');
        const data = await res.json();
        speakers = data.speakers || [];
        groups = data.groups || [];

        speakerVolumes = {};
        for (const s of speakers) {
          if (s.host && s.volume !== null) speakerVolumes[s.host] = s.volume;
        }

        if (speakers.length === 0) {
          app.innerHTML = '<div class="status">No speakers found.<br>Make sure you\'re on the same network.</div>';
          return;
        }

        render();
        setLoading(false);
      } catch (err) {
        app.innerHTML = `<div class="status error">Error: ${err.message}</div>`;
        setLoading(false);
      }
    }

    function isHouseGrouped() {
      // Check if all house speakers are in the same group
      const houseSpeakers = speakers.filter((s) => HOUSE_SPEAKERS.includes(s.name));
      if (houseSpeakers.length < 2) return false;
      const groupIds = new Set(houseSpeakers.map((s) => s.groupId));
      return groupIds.size === 1;
    }

    function render() {
      const app = document.getElementById('app');
      let html = '';

      // House status
      const grouped = isHouseGrouped();
      const statusEl = document.getElementById('house-status');
      if (grouped) {
        statusEl.innerHTML = '<span class="pill grouped">House Grouped</span>';
      } else {
        statusEl.innerHTML = '<span class="pill ungrouped">House Ungrouped</span>';
      }

      // Only show house speakers
      const houseGroups = groups.filter((group) =>
        group.members.some((m) => HOUSE_SPEAKERS.includes(m.name))
      );

      for (const group of houseGroups) {
        html += renderGroup(group);
      }

      app.innerHTML = html;
    }

    function renderGroup(group) {
      let html = '<div class="group">';

      // Group volume slider if multiple visible members
      if (group.members.length > 1) {
        const gi = groups.indexOf(group);
        const vols = group.members.map((m) => speakerVolumes[m.host] ?? 0);
        const avgVol = Math.round(vols.reduce((a, b) => a + b, 0) / vols.length);
        html += '<div class="group-volume-row">';
        html += '<span class="group-volume-label">Group</span>';
        html += `<input type="range" min="0" max="100" value="${avgVol}" id="group-slider-${gi}" oninput="setGroupVolume(${gi}, this.value)" onchange="setGroupVolume(${gi}, this.value)">`;
        html += `<span class="volume-label" id="group-label-${gi}">${avgVol}</span>`;
        html += '</div>';
      }

      for (const member of group.members) {
        const isCoord = member.isCoordinator;
        const vol = speakerVolumes[member.host] ?? 0;

        const leadSuffix = (isCoord && group.members.length > 1) ? ' <span class="speaker-coordinator">Lead</span>' : '';
        html += '<div class="speaker">';
        html += `<span class="speaker-name">${member.name}${leadSuffix}</span>`;
        html += '</div>';
        html += '<div class="volume-row">';
        html += `<input type="range" min="0" max="100" value="${vol}" id="vol-slider-${member.host}" oninput="setSpeakerVolume('${member.host}', this.value)" onchange="setSpeakerVolume('${member.host}', this.value)">`;
        html += `<span class="volume-label" id="vol-label-${member.host}">${vol}</span>`;
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function setSpeakerVolume(host, volume) {
      volume = parseInt(volume, 10);
      speakerVolumes[host] = volume;

      const label = document.getElementById(`vol-label-${host}`);
      if (label) label.textContent = volume;

      // Update group slider if part of a multi-speaker group
      for (let i = 0; i < groups.length; i++) {
        const g = groups[i];
        if (g.members.length > 1 && g.members.some((m) => m.host === host)) {
          const vols = g.members.map((m) => speakerVolumes[m.host] ?? 0);
          const avg = Math.round(vols.reduce((a, b) => a + b, 0) / vols.length);
          const gs = document.getElementById(`group-slider-${i}`);
          const gl = document.getElementById(`group-label-${i}`);
          if (gs) gs.value = avg;
          if (gl) gl.textContent = avg;
        }
      }

      clearTimeout(volumeDebounce[host]);
      volumeDebounce[host] = setTimeout(() => {
        fetch('/api/volume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ host, volume }),
        });
      }, 150);
    }

    function setGroupVolume(groupIndex, volume) {
      volume = parseInt(volume, 10);
      const group = groups[groupIndex];
      const vols = group.members.map((m) => speakerVolumes[m.host] ?? 0);
      const oldAvg = Math.round(vols.reduce((a, b) => a + b, 0) / vols.length);
      const delta = volume - oldAvg;

      for (const m of group.members) {
        const newVol = Math.max(0, Math.min(100, (speakerVolumes[m.host] ?? 0) + delta));
        speakerVolumes[m.host] = newVol;

        const s = document.getElementById(`vol-slider-${m.host}`);
        const l = document.getElementById(`vol-label-${m.host}`);
        if (s) s.value = newVol;
        if (l) l.textContent = newVol;

        clearTimeout(volumeDebounce[m.host]);
        volumeDebounce[m.host] = setTimeout(((h, v) => () => {
          fetch('/api/volume', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ host: h, volume: v }),
          });
        })(m.host, newVol), 150);
      }

      const gl = document.getElementById(`group-label-${groupIndex}`);
      if (gl) gl.textContent = volume;
    }

    async function groupHouse() {
      setLoading(true);
      try {
        const res = await fetch('/api/group-house', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        setTimeout(loadSpeakers, 1500);
      } catch (err) {
        alert('Grouping failed: ' + err.message);
        setLoading(false);
      }
    }

    async function ungroupHouse() {
      setLoading(true);
      try {
        const res = await fetch('/api/ungroup-house', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        setTimeout(loadSpeakers, 1500);
      } catch (err) {
        alert('Ungrouping failed: ' + err.message);
        setLoading(false);
      }
    }

    function setLoading(loading) {
      document.getElementById('btn-group-house').disabled = loading;
      document.getElementById('btn-ungroup-house').disabled = loading;
      if (loading) {
        document.getElementById('app').innerHTML = '<div class="status"><span class="spinner"></span>Updating groups...</div>';
        document.getElementById('house-status').innerHTML = '';
      }
    }

    loadSpeakers();
  </script>
</body>
</html>
